name: PHP CI

on:
  pull_request:
    branches: [ main, dev ]
  push:
    branches: [ main, dev ]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual run of combined CI'

# Independent jobs run in parallel; each installs its own deps (no shared cache
# benefit was being gained from serialising them). Required tools fail hard if
# missing — a green CI must mean the checks actually ran.
jobs:
  lint:
    name: Lint & Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          ini-values: memory_limit=1G, max_execution_time=0
      - name: Validate composer.json
        run: composer validate
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
      - name: PHP syntax check
        run: find . -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 php -l
      - name: Enforce no globals or Event facade
        run: |
          set +e
          # Check for $GLOBALS usage
          GLOBALS_MATCHES=$(grep -r '\$GLOBALS\[' src/ tests/ --include="*.php" 2>/dev/null || true)
          if [ -n "$GLOBALS_MATCHES" ]; then
            echo "ERROR: \$GLOBALS usage detected. Use ApplicationContext instead."
            echo "$GLOBALS_MATCHES"
            exit 1
          fi
          # Check for static Event facade usage (Event::dispatch, Event::listen, etc.)
          # Excludes: *Event::class (class constants), use statements, comments
          EVENT_MATCHES=$(grep -rn '[^a-zA-Z]Event::' src/ tests/ --include="*.php" 2>/dev/null || true)
          EVENT_MATCHES=$(echo "$EVENT_MATCHES" | grep -v 'Event::class' | grep -v ':use ' | grep -v ':\s*//' | grep -v '#\[' || true)
          if [ -n "$EVENT_MATCHES" ]; then
            echo "ERROR: Static Event facade usage detected."
            echo "$EVENT_MATCHES"
            exit 1
          fi
          echo "OK: No \$GLOBALS or Event:: facade usage found"
      - name: Check coding standards (composer run phpcs)
        run: composer run phpcs

  tests:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: glueful_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s --health-timeout=5s --health-retries=3
    strategy:
      matrix:
        php: ['8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, zip, pdo_mysql
          tools: composer:v2
          ini-values: memory_limit=1G, max_execution_time=0, xdebug.mode=off
      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
      - name: Setup test environment
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env.testing
            # config/database.php selects the engine via DB_DRIVER (NOT DB_CONNECTION,
            # which the framework does not read — leaving it set would silently fall
            # back to the sqlite default and never exercise the MySQL service below).
            echo "DB_DRIVER=mysql" >> .env.testing
            echo "DB_HOST=127.0.0.1" >> .env.testing
            echo "DB_PORT=3306" >> .env.testing
            echo "DB_DATABASE=glueful_test" >> .env.testing
            echo "DB_USERNAME=root" >> .env.testing
            echo "DB_PASSWORD=password" >> .env.testing
          fi
      - name: Run tests (composer run test)
        env:
          XDEBUG_MODE: off
        run: composer run test

  static:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          ini-values: memory_limit=1G
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
      - name: Run static analysis (composer run analyse)
        run: composer run analyse

  # NOTE: dependency advisories are handled by GitHub Dependabot (out-of-band,
  # opens fix PRs), not a CI audit step. And `php glueful security:check --production`
  # is a deployed-app readiness command (it boots Redis/DB/extensions/routes) — it
  # belongs in the APP's deploy/staging pipeline, not framework PR CI.
  coverage:
    name: Coverage (PHP 8.3, non-blocking)
    runs-on: ubuntu-latest
    # Informational only — coverage tooling flakiness must not block merges/releases.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP (with Xdebug)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: xdebug
          tools: composer:v2
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
      - name: Run coverage
        run: |
          mkdir -p build/logs
          vendor/bin/phpunit --coverage-clover build/logs/clover.xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: build/logs/clover.xml
          if-no-files-found: warn
